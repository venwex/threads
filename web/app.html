<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Home | Threads</title>

    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="/app.html" class="logo">◎</a>

            <nav class="nav">
                <a href="/app.html" class="nav-item active">
                    <span>⌂</span>
                    <strong>Home</strong>
                </a>

                <a href="#" class="nav-item">
                    <span>⌕</span>
                    <strong>Search</strong>
                </a>

                <a href="#" class="nav-item">
                    <span>✎</span>
                    <strong>Create</strong>
                </a>

                <a href="#" class="nav-item">
                    <span>♡</span>
                    <strong>Activity</strong>
                </a>

                <a href="#" class="nav-item">
                    <span>◉</span>
                    <strong>Profile</strong>
                </a>
            </nav>
        </div>

        <div class="sidebar-profile">
            <div id="sidebarAvatar" class="small-avatar">?</div>

            <div>
                <strong id="profileName">user</strong>
                <span id="profileEmail">email</span>
            </div>
        </div>

        <button id="logoutBtn" class="logout-btn">⇥ Logout</button>
    </aside>

    <main class="feed">
        <header class="feed-header">
            <h1>Home</h1>
            <span>threads</span>
        </header>

        <section class="composer-card">
            <div id="composerAvatar" class="post-avatar">?</div>

            <form id="postForm" class="composer-form">
                    <textarea
                            id="postInput"
                            placeholder="What's new?"
                            maxlength="500"
                            rows="3"
                    ></textarea>

                <div class="composer-footer">
                    <span>Anyone can reply</span>
                    <button id="postButton" type="submit" disabled>Post</button>
                </div>
            </form>
        </section>

        <section id="postsList" class="posts-list"></section>
    </main>

    <aside class="right-panel">
        <section class="suggest-card">
            <h2>Project status</h2>

            <div class="status-row">
                <span>API</span>
                <strong>connected</strong>
            </div>

            <div class="status-row">
                <span>Auth</span>
                <strong>JWT</strong>
            </div>

            <div class="status-row">
                <span>Realtime</span>
                <strong>WebSocket</strong>
            </div>
        </section>

        <section class="suggest-card">
            <h2>What this is</h2>
            <p>
                A small Threads-like client for your Go backend.
                No framework. No bundler. No npm swamp.
            </p>
        </section>
    </aside>
</div>

<nav class="mobile-nav">
    <a href="/app.html" class="active">⌂</a>
    <a href="#">⌕</a>
    <a href="#">✎</a>
    <a href="#">♡</a>
    <a href="#">◉</a>
</nav>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
